name: PSP-Reusable
on:
  workflow_call:
    inputs:
      os:
        type: string
        required: true
      build_type:
        type: string
        required: true
      build_script:
        type: string
        required: true

env:
  artifact_name: build-${{ inputs.os }}-${{ inputs.build_script }}-${{ inputs.build_type }}

jobs:
  build:
    name: Build PSP
    runs-on: ${{ inputs.os }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          path: 'src'
          submodules: recursive
          ref: ${{ github.ref }}

      - name: Install dependencies
        run: src/ci_scripts/ubuntu-deps.sh

      - name: Build postgres
        run: src/ci_scripts/${{ inputs.build_script }}-build.sh ${{ inputs.build_type }}

      - name: 'Tar files'
        run: tar -czf artifacts.tar src pginst

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          overwrite: true
          path: |
            artifacts.tar
          retention-days: 1

  test:
    name: Test PSP
    runs-on: ${{ inputs.os }}
    needs: build
    
    steps: 
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: .

      - name: 'Untar files'
        run: tar -xzf artifacts.tar

      - name: Install dependencies
        run: src/ci_scripts/ubuntu-deps.sh
  
      - name: Setup kmip and vault
        run: src/ci_scripts/setup-keyring-servers.sh

      - name: Test postgres
        run: src/ci_scripts/${{ inputs.build_script }}-test.sh

      - name: Report on test fail
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: testlog-ubuntu-${{ inputs.ubuntu_version }}.04-meson-${{ inputs.build_type }}
          path: |
            src/build/testrun/
            src/contrib/*/t/
            src/contrib/*/results
            src/contrib/*/regression.diffs
            src/contrib/*/regression.out
          retention-days: 3

  test_tde:
    name: Test PSP with TDE
    runs-on: ${{ inputs.os }}
    if: inputs.build_script == 'make'
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: .

      - name: 'Untar files'
        run: tar -xzf artifacts.tar

      - name: Install dependencies
        run: src/ci_scripts/ubuntu-deps.sh

      - name: Setup kmip and vault
        run: src/ci_scripts/setup-keyring-servers.sh

      - name: Test postgres with TDE
        run: src/ci_scripts/${{ inputs.build_script }}-test-tde.sh --continue

      - name: Report on test fail
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: testlog-tde-${{ inputs.os }}-${{  inputs.build_script }}-${{ inputs.build_type }}
          path: |
            src/build/testrun/
            src/contrib/*/t/
            src/contrib/*/results
            src/contrib/*/regression.diffs
            src/contrib/*/regression.out
          retention-days: 3

  tde_coverage:
    name: Test PSP with TDE For Coverage
    runs-on: ${{ inputs.os }}
    if: inputs.build_script == 'make'
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.artifact_name }}
          path: .

      - name: 'Untar files'
        run: tar -xzf artifacts.tar

      - name: Install dependencies
        run: src/ci_scripts/ubuntu-deps.sh

      - name: Setup kmip and vault
        run: src/ci_scripts/setup-keyring-servers.sh

      - name: Test postgres with TDE to generate coverage
        run: src/ci_scripts/${{ inputs.build_script }}-test-tde.sh --continue --tde-only

      - name: Run code coverage
        run: |
          gcov -abcfu contrib/pg_tde/src/pg_tde.c
          gcov -abcfu contrib/pg_tde/src/pg_tde_defs.c
          gcov -abcfu contrib/pg_tde/src/pg_tde_event_capture.c
          gcov -abcfu contrib/pg_tde/src/pg_tde_guc.c
          gcov -abcfu contrib/pg_tde/src/access/pg_tde_ddl.c
          gcov -abcfu contrib/pg_tde/src/access/pg_tde_slot.c
          gcov -abcfu contrib/pg_tde/src/access/pg_tde_tdemap.c
          gcov -abcfu contrib/pg_tde/src/access/pg_tde_xlog.c
          gcov -abcfu contrib/pg_tde/src/access/pg_tde_xlog_encrypt.c
          gcov -abcfu contrib/pg_tde/src/catalog/tde_keyring.c
          gcov -abcfu contrib/pg_tde/src/catalog/tde_keyring_parse_opts.c
          gcov -abcfu contrib/pg_tde/src/catalog/tde_principal_key.c
          gcov -abcfu contrib/pg_tde/src/common/pg_tde_shmem.c
          gcov -abcfu contrib/pg_tde/src/common/pg_tde_utils.c
          gcov -abcfu contrib/pg_tde/src/encryption/enc_aes.c
          gcov -abcfu contrib/pg_tde/src/encryption/enc_tde.c
          gcov -abcfu contrib/pg_tde/src/keyring/keyring_api.c
          gcov -abcfu contrib/pg_tde/src/keyring/keyring_curl.c
          gcov -abcfu contrib/pg_tde/src/keyring/keyring_file.c
          gcov -abcfu contrib/pg_tde/src/keyring/keyring_kmip.c
          gcov -abcfu contrib/pg_tde/src/keyring/keyring_kmip_ereport.c
          gcov -abcfu contrib/pg_tde/src/keyring/keyring_vault.c
          gcov -abcfu contrib/pg_tde/src/smgr/pg_tde_smgr.c
          gcov -abcfu contrib/pg_tde/src/transam/pg_tde_xact_handler.c
        working-directory: src

      - name: Upload
        uses: codecov/codecov-action@v5
        with:
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: src
          files: ./pg_tde.c.gcov,./percona.h.gcov,./pg_tde_defs.c.gcov,./transam.h.gcov,./pg_tde_event_capture.c.gcov,./pg_tde_guc.c.gcov,./pg_tde_tdemap.c.gcov,./pg_tde_xlog.c.gcov,./pg_tde_xlog_encrypt.c.gcov,./pg_tde_tdemap.h.gcov,./xlog_smgr.h.gcov,./generic.h.gcov,./atomics.h.gcov,./tde_keyring.c.gcov,./pg_list.h.gcov,./tde_keyring_parse_opts.c.gcov,./timestamp.h.gcov,./tde_principal_key.c.gcov,./funcapi.h.gcov,./pg_tde_shmem.c.gcov,./pg_tde_utils.c.gcov,./postgres.h.gcov,./enc_aes.c.gcov,./enc_tde.c.gcov,./palloc.h.gcov,./keyring_api.c.gcov,./keyring_curl.c.gcov,./keyring_file.c.gcov,./keyring_kmip.c.gcov,./keyring_vault.c.gcov,./typecheck-gcc.h.gcov,./pg_tde_smgr.c.gcov,./pg_tde_xact_handler.c.gcov

      - name: Report on test fail
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: testlog-tde-${{ inputs.os }}-${{  inputs.build_script }}-${{ inputs.build_type }}
          path: |
            src/build/testrun/
            src/contrib/*/t/
            src/contrib/*/results
            src/contrib/*/regression.diffs
            src/contrib/*/regression.out
          retention-days: 3
